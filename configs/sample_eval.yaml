model:
  api_base: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  model_name: "gpt-5.4"
  timeout_seconds: 120
  temperature: 0.1
  max_tokens: 1000

evaluation:
  output_name: "baseline_run"
  save_transcript: true
  score_weights:
    regulatory_alignment: 0.45
    physical_consistency: 0.35
    decision_completeness: 0.20
    forbidden_penalty: 0.20
    contradiction_penalty: 0.15

